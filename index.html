<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shipment Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#0f172a; --navy2:#1e3a5f; --blue:#0ea5e9; --blue2:#2563eb;
      --surface:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.09);
      --text:#f1f5f9; --muted:#64748b; --mid:#94a3b8;
    }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 60%,var(--navy) 100%); min-height:100vh; color:var(--text); }
    #topbar { background:rgba(255,255,255,0.04); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; backdrop-filter:blur(12px); }
    #topbar .logo{font-size:22px} #topbar .brand{font-size:14px;font-weight:700;letter-spacing:.4px} #topbar .sub{font-size:11px;color:var(--muted)}
    #pill{margin-left:auto;font-size:11px;color:var(--muted);background:rgba(255,255,255,0.05);padding:4px 12px;border-radius:20px;display:flex;align-items:center;gap:5px}
    #live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;display:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    #app{max-width:760px;margin:0 auto;padding:44px 20px 60px}
    h1{font-size:30px;font-weight:800;letter-spacing:-.5px} .subtitle{color:var(--muted);margin-top:8px;font-size:15px}
    #search-area{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,.3);margin-top:32px;display:none}
    .toggle-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .toggle-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;background:rgba(255,255,255,.08);color:var(--mid)}
    .toggle-btn.active{background:var(--blue);color:#fff}
    .search-row{display:flex;gap:10px}
    #search-input{flex:1;padding:14px 18px;border-radius:12px;font-size:14px;background:rgba(255,255,255,.1);color:var(--text);border:1px solid rgba(255,255,255,.15);outline:none;transition:border .2s}
    #search-input:focus{border-color:var(--blue)} #search-input::placeholder{color:var(--muted)}
    #search-btn{padding:14px 28px;border-radius:12px;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(14,165,233,.4);white-space:nowrap}
    #clear-btn{margin-top:10px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;display:none}
    #status-bar{margin-top:12px;font-size:11px;color:var(--muted)}
    #loader{display:none;text-align:center;padding:64px 20px}
    .spinner{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.1);border-top-color:var(--blue);animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loader p{color:var(--muted);font-size:14px}
    #error-box{display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:16px 20px;margin-top:20px;color:#991b1b;font-size:13px;line-height:1.6}
    #results{margin-top:28px}
    .result-count{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:14px}
    .empty{text-align:center;padding:48px 20px;background:var(--surface);border-radius:16px;border:1px dashed var(--border)}
    .empty .icon{font-size:40px;margin-bottom:12px} .empty h3{font-size:16px;margin-bottom:6px} .empty p{font-size:13px;color:var(--muted)} .empty strong{color:var(--mid)}
    .card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);border:1px solid #e5e7eb;margin-bottom:18px;color:#111827}
    .card-header{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);padding:20px 24px}
    .card-header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .card-eyebrow{font-size:11px;color:#94a3b8;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
    .card-supplier{font-size:18px;color:#fff;font-weight:700;line-height:1.3} .card-po{font-size:13px;color:#94a3b8;margin-top:3px}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0}
    .route{display:flex;align-items:center;gap:10px;margin-top:16px}
    .port-box{background:rgba(255,255,255,.1);border-radius:8px;padding:6px 14px;text-align:center}
    .port-code{font-size:18px;font-weight:800;color:#f1f5f9} .port-label{font-size:10px;color:#94a3b8}
    .route-line{flex:1;position:relative;height:2px;background:rgba(255,255,255,.15);border-radius:1px}
    .route-arrow{position:absolute;right:-2px;top:50%;transform:translateY(-50%);color:#64748b;font-size:13px}
    .vessel-label{position:absolute;left:50%;top:-16px;transform:translateX(-50%);font-size:10px;color:#64748b;white-space:nowrap;font-style:italic}
    .progress-wrap{margin:16px 0 4px}
    .progress-nodes{display:flex;justify-content:space-between;margin-bottom:6px}
    .progress-node{display:flex;flex-direction:column;align-items:center;width:calc(100%/6)}
    .progress-dot{width:10px;height:10px;border-radius:50%;background:#374151;margin-bottom:3px}
    .progress-lbl{font-size:9px;color:#6b7280}
    .progress-bar-track{position:relative;height:4px;background:#e5e7eb;border-radius:2px;margin-top:-18px}
    .progress-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
    .on-hold-bar{display:flex;align-items:center;gap:8px;margin:12px 0 4px}
    .on-hold-track{flex:1;height:4px;border-radius:2px;background:#fee2e2}
    .on-hold-fill{width:100%;height:100%;background:#ef4444;border-radius:2px}
    .on-hold-label{font-size:11px;color:#ef4444;font-weight:600}
    .dates-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid #f3f4f6}
    .date-cell{padding:12px 8px;text-align:center;border-right:1px solid #f3f4f6}
    .date-cell:last-child{border-right:none}
    .date-lbl{font-size:11px;color:#6b7280;font-weight:600;letter-spacing:.5px}
    .date-val{font-size:14px;font-weight:700;color:#0f172a;margin-top:2px}
    .date-val.empty{color:#d1d5db}
    .info-section{padding:0 20px 4px}
    .info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f3f4f6}
    .info-lbl{font-size:12px;color:#6b7280;font-weight:500;min-width:160px}
    .info-val{font-size:13px;color:#111827;text-align:right;max-width:60%}
    .info-val.hl{color:#1d4ed8;font-weight:600}
    .remarks-box{margin:4px 20px 16px;background:#f8fafc;border-radius:10px;padding:12px 14px;border:1px solid #e2e8f0}
    .remarks-title{font-size:11px;color:#64748b;font-weight:700;letter-spacing:.5px;margin-bottom:6px}
    .remarks-text{font-size:12px;color:#374151;line-height:1.6}
    .remarks-add{font-size:12px;color:#6b7280;margin-top:4px;font-style:italic}
    #footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:20px}
  </style>
</head>
<body>

<div id="topbar">
  <span class="logo">🌊</span>
  <div>
    <div class="brand">SHIPMENT TRACKER</div>
    <div class="sub">LCL Freight Status Portal · TKM Global</div>
  </div>
  <div id="pill"><span id="live-dot"></span><span id="pill-text">Loading…</span></div>
</div>

<div id="app">
  <h1>Track Your Shipment</h1>
  <p class="subtitle">Enter your PO Number or Position Number to get real-time status</p>

  <div id="loader"><div class="spinner"></div><p>Loading live shipment data…</p></div>
  <div id="error-box"></div>

  <div id="search-area">
    <div class="toggle-row">
      <button class="toggle-btn active" data-type="both">Both</button>
      <button class="toggle-btn" data-type="po">PO Number</button>
      <button class="toggle-btn" data-type="pos">Position No.</button>
    </div>
    <div class="search-row">
      <input id="search-input" type="text" placeholder="e.g. TSL/57439 or 22-0010-605-00" />
      <button id="search-btn" onclick="doSearch()">Search</button>
    </div>
    <button id="clear-btn" onclick="clearSearch()">✕ Clear</button>
    <div id="status-bar"></div>
  </div>

  <div id="results"></div>
</div>

<div id="footer">Live data · REPORT_SEA.xlsx · TKM Global ShipmentRepository</div>

<script>
"use strict";

const FLOW_URL = "https://default14652ebc085543ca82e50e5247aa91.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1da5e8d7ed4e497ba831641b1d32631a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=9z8WQ-jd8UrC7JOvCJINgv8pfyLhA5z9xCbj04rdxFY";

const STATUS = {
  "In Transit":                      {color:"#0ea5e9",bg:"#e0f2fe",dot:"#0284c7",icon:"🚢",step:4},
  "Shipped":                         {color:"#8b5cf6",bg:"#ede9fe",dot:"#7c3aed",icon:"✅",step:4},
  "At Warehouse / Awaiting Sailing": {color:"#f59e0b",bg:"#fef3c7",dot:"#d97706",icon:"🏭",step:3},
  "Booked / Awaiting ETD":           {color:"#3b82f6",bg:"#dbeafe",dot:"#2563eb",icon:"📋",step:2},
  "Booked":                          {color:"#3b82f6",bg:"#dbeafe",dot:"#2563eb",icon:"📋",step:2},
  "At Warehouse":                    {color:"#f59e0b",bg:"#fef3c7",dot:"#d97706",icon:"🏭",step:2},
  "Booking Pending":                 {color:"#6b7280",bg:"#f3f4f6",dot:"#4b5563",icon:"⏳",step:1},
  "On Hold":                         {color:"#ef4444",bg:"#fee2e2",dot:"#dc2626",icon:"⚠️",step:0},
};

let allShipments=[], searchType="both", fetchedAt=null;

window.addEventListener("DOMContentLoaded", async ()=>{
  document.querySelectorAll(".toggle-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(".toggle-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active"); searchType=btn.dataset.type; updatePlaceholder();
    });
  });
  document.getElementById("search-input").addEventListener("keydown",e=>{ if(e.key==="Enter") doSearch(); });
  await loadData();
});

async function loadData(){
  showLoader();
  try {
    const res = await fetch(FLOW_URL, {method:"POST", headers:{"Content-Type":"application/json"}, body:"{}"});
    if(!res.ok){ const t=await res.text(); throw new Error(`Flow returned ${res.status}: ${t}`); }
    const raw = await res.json();
    const rows = Array.isArray(raw) ? raw : (raw.value || raw.body || []);
    allShipments = rows.map(normaliseRow).filter(s=>s.po_number||s.position_no);
    fetchedAt = new Date();
    showSearchArea();
  } catch(err){
    showError("Could not load shipment data.<br><strong>Details:</strong> "+err.message+"<br><br>Make sure the Power Automate flow is active and the Response action has <code>Access-Control-Allow-Origin: *</code> header.");
  }
}

function get(r,...keys){ for(const k of keys){ if(r[k]!==undefined&&r[k]!==null&&String(r[k]).trim()!=="") return String(r[k]).trim(); } return ""; }
function fmtDate(v){ if(!v||v==="-") return ""; const m=String(v).match(/(\d{4})-(\d{2})-(\d{2})/); if(m) return `${m[3]}.${m[2]}.${m[1]}`; return String(v).trim(); }

function deriveStatus(s){
  const sup=s.supplier.toLowerCase(), rem=s.remarks.toLowerCase();
  if(sup.includes("on hold")||rem.includes("on hold")||rem.includes("put on hold")) return "On Hold";
  if(s.sob) return s.eta?"In Transit":"Shipped";
  if(s.etd&&s.etd!=="-") return s.arrival_wh?"At Warehouse / Awaiting Sailing":"Booked / Awaiting ETD";
  if(s.booking_no) return "Booked";
  if(s.arrival_wh) return "At Warehouse";
  return "Booking Pending";
}

function normaliseRow(r){
  const s={
    supplier:    get(r,"Supplier","supplier"),
    po_number:   get(r,"PO_number","PO_Number","PONumber","PO number"),
    incoterm:    get(r,"Incoterm"),
    pol:         get(r,"POL"),
    pod:         get(r,"POD"),
    pieces:      get(r,"No_ of Pieces","No. of Pieces","No_of_Pieces"),
    gross_wt:    get(r,"Gross Wt_ (Kgs)","Gross Wt. (Kgs)","Gross_Wt__Kgs_"),
    cbm:         get(r,"CBM"),
    vessel:      get(r,"Vessel"),
    release_date:fmtDate(get(r,"Release date","Release_date")),
    readiness:   fmtDate(get(r,"Readiness")),
    pickup:      fmtDate(get(r,"Pickup"))||get(r,"Pickup"),
    arrival_wh:  fmtDate(get(r,"Arrival at Warehouse","Arrival_at_Warehouse")),
    etd:         fmtDate(get(r,"ETD"))||get(r,"ETD"),
    sob:         fmtDate(get(r,"Shipped_on_Board","Shipped on Board","SOB")),
    eta:         fmtDate(get(r,"ETA"))||get(r,"ETA"),
    z_no:        get(r,"Z_No","Z No"),
    position_no: get(r,"Position_No","Position No","Position_No_"),
    hbl:         get(r,"HBL"),
    mbl:         get(r,"MBL"),
    booking_no:  get(r,"Booking No_","Booking No.","Booking_No_"),
    remarks:     get(r,"Remarks"),
    add_remarks: get(r,"Additional Remarks","Additional_Remarks"),
  };
  s.status=deriveStatus(s);
  return s;
}

function doSearch(){
  const q=document.getElementById("search-input").value.trim().toLowerCase();
  if(!q) return;
  document.getElementById("clear-btn").style.display="inline";
  const res=allShipments.filter(s=>{
    const po=s.po_number.toLowerCase().includes(q);
    const pos=s.position_no.toLowerCase().includes(q);
    if(searchType==="po") return po;
    if(searchType==="pos") return pos;
    return po||pos;
  });
  const c=document.getElementById("results");
  if(res.length===0){
    c.innerHTML=`<div class="empty"><div class="icon">🔍</div><h3>No records found</h3><p>No shipments match "<strong>${escHtml(q)}</strong>". Check your reference and try again.</p></div>`;
  } else {
    c.innerHTML=`<div class="result-count">${res.length} shipment${res.length>1?"s":""} found for "${escHtml(q)}"</div>`+res.map(renderCard).join("");
  }
}

function clearSearch(){ document.getElementById("search-input").value=""; document.getElementById("results").innerHTML=""; document.getElementById("clear-btn").style.display="none"; }
function updatePlaceholder(){ const m={both:"e.g. TSL/57439 or 22-0010-605-00",po:"e.g. TSL/57439/4415887949",pos:"e.g. 22-0010-605-00"}; document.getElementById("search-input").placeholder=m[searchType]; }

function renderCard(s){
  const cfg=STATUS[s.status]||STATUS["Booking Pending"];
  const isHold=s.status==="On Hold";
  const labels=["Booking","Booked","Warehouse","Awaiting Sail","In Transit","Delivered"];
  const pct=(cfg.step/(labels.length-1)*100).toFixed(1);
  const progressHTML=isHold
    ?`<div class="on-hold-bar"><div class="on-hold-track"><div class="on-hold-fill"></div></div><span class="on-hold-label">ON HOLD</span></div>`
    :`<div class="progress-wrap">
        <div class="progress-nodes">${labels.map((l,i)=>`<div class="progress-node"><div class="progress-dot" style="background:${i<=cfg.step?cfg.dot:"#374151"};${i===cfg.step?"box-shadow:0 0 0 3px rgba(14,165,233,.25);width:12px;height:12px":""}"></div><span class="progress-lbl" style="color:${i<=cfg.step?cfg.color:"#6b7280"};font-weight:${i===cfg.step?700:400}">${l}</span></div>`).join("")}</div>
        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${cfg.dot},${cfg.color})"></div></div>
      </div>`;
  const infoRows=[
    {label:"Position No.",value:s.position_no,hl:true},
    {label:"Booking No.",value:s.booking_no,hl:true},
    {label:"HBL",value:s.hbl},{label:"MBL",value:s.mbl},
    {label:"Z-Number",value:s.z_no},{label:"Incoterm",value:s.incoterm},
    {label:"Pieces",value:s.pieces.replace(/\.0$/,"")},
    {label:"Gross Weight",value:s.gross_wt?s.gross_wt.replace(/\.0$/,"")+" kg":""},
    {label:"CBM",value:s.cbm?s.cbm+" m³":""},
    {label:"Release Date",value:s.release_date},{label:"Readiness",value:s.readiness},
    {label:"Pickup",value:s.pickup},{label:"Arrival at Warehouse",value:s.arrival_wh},
  ].filter(r=>r.value&&r.value!=="-")
   .map(r=>`<div class="info-row"><span class="info-lbl">${r.label}</span><span class="info-val ${r.hl?"hl":""}">${escHtml(r.value)}</span></div>`).join("");
  const remarksHTML=(s.remarks||s.add_remarks)?`<div class="remarks-box"><div class="remarks-title">REMARKS</div>${s.remarks?`<div class="remarks-text">${escHtml(s.remarks)}</div>`:""} ${s.add_remarks?`<div class="remarks-add">${escHtml(s.add_remarks)}</div>`:""}</div>`:"";
  return `<div class="card">
    <div class="card-header">
      <div class="card-header-top">
        <div><div class="card-eyebrow">Shipment Record</div><div class="card-supplier">${escHtml(s.supplier)}</div><div class="card-po">${escHtml(s.po_number)}</div></div>
        <span class="badge" style="background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.color}33">${cfg.icon} ${escHtml(s.status)}</span>
      </div>
      <div class="route">
        <div class="port-box"><div class="port-code">${escHtml(s.pol||"—")}</div><div class="port-label">Origin</div></div>
        <div class="route-line">${s.vessel&&s.vessel!=="TBA"?`<div class="vessel-label">${escHtml(s.vessel)}</div>`:""}<span class="route-arrow">▶</span></div>
        <div class="port-box"><div class="port-code">${escHtml(s.pod||"—")}</div><div class="port-label">Destination</div></div>
      </div>
      ${progressHTML}
    </div>
    <div class="dates-row">${[["ETD",s.etd],["SOB",s.sob],["ETA",s.eta]].map(([l,v])=>`<div class="date-cell"><div class="date-lbl">${l}</div><div class="date-val ${v?"":"empty"}">${v||"—"}</div></div>`).join("")}</div>
    <div class="info-section">${infoRows}</div>
    ${remarksHTML}
  </div>`;
}

function showLoader(){ document.getElementById("loader").style.display="block"; document.getElementById("search-area").style.display="none"; document.getElementById("error-box").style.display="none"; document.getElementById("pill-text").textContent="Loading…"; document.getElementById("live-dot").style.display="none"; }
function showSearchArea(){ document.getElementById("loader").style.display="none"; document.getElementById("search-area").style.display="block"; document.getElementById("live-dot").style.display="inline-block"; document.getElementById("pill-text").textContent=`Live · ${allShipments.length} shipments`; document.getElementById("status-bar").textContent=`⟳ Data fetched at ${fetchedAt.toLocaleTimeString()} · ${allShipments.length} shipments loaded`; }
function showError(html){ document.getElementById("loader").style.display="none"; document.getElementById("error-box").style.display="block"; document.getElementById("error-box").innerHTML="⚠️ "+html; document.getElementById("pill-text").textContent="Error"; }
function escHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
</script>
</body>
</html>
