<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shipment Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:#0f172a; --navy2:#1e3a5f; --blue:#0ea5e9; --blue2:#2563eb;
      --surface:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.09);
      --text:#f1f5f9; --muted:#64748b; --mid:#94a3b8;
    }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 60%,var(--navy) 100%); min-height:100vh; color:var(--text); }

    /* TOP BAR */
    #topbar { background:rgba(255,255,255,0.04); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; backdrop-filter:blur(12px); }
    #topbar .logo{font-size:22px} #topbar .brand{font-size:14px;font-weight:700;letter-spacing:.4px} #topbar .sub{font-size:11px;color:var(--muted)}
    #pill{margin-left:auto;font-size:11px;color:var(--muted);background:rgba(255,255,255,0.05);padding:4px 12px;border-radius:20px;display:flex;align-items:center;gap:5px}
    #live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;display:none}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* MAIN */
    #app{max-width:800px;margin:0 auto;padding:40px 20px 60px}
    h1{font-size:30px;font-weight:800;letter-spacing:-.5px} .subtitle{color:var(--muted);margin-top:8px;font-size:15px}

    /* SEARCH */
    #search-area{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,.3);margin-top:32px;display:none}
    .toggle-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .toggle-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;background:rgba(255,255,255,.08);color:var(--mid)}
    .toggle-btn.active{background:var(--blue);color:#fff}
    .search-row{display:flex;gap:10px}
    #search-input{flex:1;padding:14px 18px;border-radius:12px;font-size:14px;background:rgba(255,255,255,.1);color:var(--text);border:1px solid rgba(255,255,255,.15);outline:none;transition:border .2s}
    #search-input:focus{border-color:var(--blue)} #search-input::placeholder{color:var(--muted)}
    #search-btn{padding:14px 28px;border-radius:12px;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(14,165,233,.4);white-space:nowrap}
    #clear-btn{margin-top:10px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;display:none}
    #status-bar{margin-top:12px;font-size:11px;color:var(--muted)}

    /* LOADER */
    #loader{display:none;text-align:center;padding:64px 20px}
    .spinner{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.1);border-top-color:var(--blue);animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loader p{color:var(--muted);font-size:14px}
    #error-box{display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:16px 20px;margin-top:20px;color:#991b1b;font-size:13px;line-height:1.6}

    /* RESULTS */
    #results{margin-top:28px}
    .result-count{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:14px}
    .empty{text-align:center;padding:48px 20px;background:var(--surface);border-radius:16px;border:1px dashed var(--border)}
    .empty .icon{font-size:40px;margin-bottom:12px} .empty h3{font-size:16px;margin-bottom:6px} .empty p{font-size:13px;color:var(--muted)}

    /* ── CARD ── */
    .card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 6px 32px rgba(0,0,0,.14);border:1px solid #e2e8f0;margin-bottom:20px;color:#111827}

    /* Card header */
    .card-head{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);padding:20px 24px 24px}
    .card-po-label{font-size:10px;color:#94a3b8;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:4px}
    .card-po-value{font-size:20px;color:#fff;font-weight:800;letter-spacing:-.3px}
    .card-route{display:flex;align-items:center;gap:0;margin-top:12px}
    .route-port{background:rgba(255,255,255,.12);border-radius:8px;padding:5px 14px;text-align:center;min-width:60px}
    .route-port-code{font-size:16px;font-weight:800;color:#f1f5f9}
    .route-port-label{font-size:9px;color:#94a3b8;margin-top:1px}
    .route-mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 10px}
    .route-arrow-line{width:100%;height:2px;background:rgba(255,255,255,.2);border-radius:1px;position:relative}
    .route-arrow-line::after{content:"▶";position:absolute;right:-6px;top:50%;transform:translateY(-50%);color:#64748b;font-size:11px}
    .route-vessel{font-size:10px;color:#64748b;font-style:italic;text-align:center;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── 7-STEP TRACKER ── */
    .tracker-wrap{background:#fff;padding:20px 20px 8px;border-bottom:1px solid #f1f5f9}
    .tracker-title{font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
    .tracker{position:relative;padding:0 0 28px}

    /* connecting line behind nodes */
    .tracker-line-bg{position:absolute;top:14px;left:calc(100%/14);right:calc(100%/14);height:3px;background:#e5e7eb;border-radius:2px;z-index:0}
    .tracker-line-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#0ea5e9,#2563eb);border-radius:2px;transition:width .5s ease}

    .tracker-nodes{display:flex;justify-content:space-between;position:relative;z-index:1}
    .tracker-node{display:flex;flex-direction:column;align-items:center;flex:1}

    /* circle */
    .node-circle{
      width:28px;height:28px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;
      border:2.5px solid #d1d5db;
      background:#fff;color:#9ca3af;
      transition:all .3s;
      position:relative;z-index:2;
    }
    .node-circle.done{background:#0ea5e9;border-color:#0ea5e9;color:#fff;box-shadow:0 2px 8px rgba(14,165,233,.4)}
    .node-circle.done::after{content:"✓";font-size:13px}
    .node-circle.open{background:#fff;border-color:#d1d5db;color:#d1d5db}
    .node-circle.open::after{content:"○";font-size:16px}

    /* label */
    .node-label{
      font-size:9px;font-weight:600;color:#9ca3af;
      text-align:center;margin-top:6px;line-height:1.3;
      max-width:60px;
    }
    .node-label.done{color:#0ea5e9}
    .node-label.open{color:#cbd5e1}

    /* ── INFO GRID ── */
    .info-grid{padding:16px 20px 20px;display:grid;grid-template-columns:1fr 1fr;gap:0}
    .info-item{padding:9px 0;border-bottom:1px solid #f3f4f6}
    .info-item.full{grid-column:1/-1}
    .info-label{font-size:10px;color:#94a3b8;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px}
    .info-value{font-size:13px;color:#111827;font-weight:500}
    .info-value.highlight{color:#1d4ed8;font-weight:700}
    .info-value.tba{color:#94a3b8;font-style:italic}
    .info-sep{color:#94a3b8;margin:0 6px}

    #footer{text-align:center;padding:20px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:20px}
  </style>
</head>
<body>

<div id="topbar">
  <span class="logo">🌊</span>
  <div>
    <div class="brand">SHIPMENT TRACKER</div>
    <div class="sub">LCL Freight Status Portal · TKM Global</div>
  </div>
  <div id="pill"><span id="live-dot"></span><span id="pill-text">Loading…</span></div>
</div>

<div id="app">
  <h1>Track Your Shipment</h1>
  <p class="subtitle">Enter your PO Number or Position Number to get real-time status</p>

  <div id="loader"><div class="spinner"></div><p>Loading live shipment data…</p></div>
  <div id="error-box"></div>

  <div id="search-area">
    <div class="toggle-row">
      <button class="toggle-btn active" data-type="both">Both</button>
      <button class="toggle-btn" data-type="po">PO Number</button>
      <button class="toggle-btn" data-type="pos">Position No.</button>
    </div>
    <div class="search-row">
      <input id="search-input" type="text" placeholder="e.g. TSL/57439 or 22-0010-605-00" />
      <button id="search-btn" onclick="doSearch()">Search</button>
    </div>
    <button id="clear-btn" onclick="clearSearch()">✕ Clear</button>
    <div id="status-bar"></div>
  </div>

  <div id="results"></div>
</div>

<div id="footer">Live data · REPORT_SEA.xlsx · TKM Global ShipmentRepository</div>

<script>
"use strict";

const FLOW_URL = "https://default14652ebc085543ca82e50e5247aa91.d7.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1da5e8d7ed4e497ba831641b1d32631a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=9z8WQ-jd8UrC7JOvCJINgv8pfyLhA5z9xCbj04rdxFY";

let allShipments=[], searchType="both", fetchedAt=null;

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener("DOMContentLoaded", async ()=>{
  document.querySelectorAll(".toggle-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(".toggle-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active"); searchType=btn.dataset.type; updatePlaceholder();
    });
  });
  document.getElementById("search-input").addEventListener("keydown",e=>{ if(e.key==="Enter") doSearch(); });
  await loadData();
});

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadData(){
  showLoader();
  try {
    const res = await fetch(FLOW_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
    if(!res.ok){ const t=await res.text(); throw new Error(`Flow returned ${res.status}: ${t}`); }
    const raw = await res.json();
    const rows = Array.isArray(raw)?raw:(raw.value||raw.body||[]);
    allShipments = rows.map(normaliseRow).filter(s=>s.po_number||s.position_no);
    fetchedAt = new Date();
    showSearchArea();
  } catch(err){
    showError("Could not load shipment data.<br><strong>Details:</strong> "+err.message);
  }
}

// ── DATE PARSING (handles Excel serial numbers too) ───────────
function fmtDate(v){
  if(v===undefined||v===null||v==="") return "";
  const s = String(v).trim();
  if(s==="-"||s.toLowerCase()==="nat") return "";

  // Excel serial date number (e.g. 46150 = 08.05.2026)
  const num = Number(s);
  if(!isNaN(num) && num>40000 && num<60000){
    const d = new Date(Math.round((num-25569)*86400*1000));
    const dd=String(d.getUTCDate()).padStart(2,"0");
    const mm=String(d.getUTCMonth()+1).padStart(2,"0");
    const yy=d.getUTCFullYear();
    return `${dd}.${mm}.${yy}`;
  }

  // ISO format YYYY-MM-DD
  const m=s.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(m) return `${m[3]}.${m[2]}.${m[1]}`;

  // Already DD.MM.YYYY
  if(/^\d{2}\.\d{2}\.\d{4}$/.test(s)) return s;

  return s;
}

// ── LABEL DATE (Planned vs Completed) ────────────────────────
function labelDate(dateStr){
  if(!dateStr || dateStr==='-' || dateStr==='TBA') return dateStr;
  // Parse DD.MM.YYYY
  const m = dateStr.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if(!m) return dateStr;
  const d = new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  if(d <= yesterday){
    return dateStr; // completed — date only
  } else {
    return dateStr + ' <span style="font-size:11px;color:#f59e0b;font-weight:600">(Planned)</span>';
  }
}

// ── IS COMPLETED (date strictly before today) ────────────────
function isCompleted(dateStr){
  if(!dateStr || dateStr==='-' || dateStr==='TBA' || dateStr==='') return false;
  const m = dateStr.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if(!m) return false;
  const d = new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
  const today = new Date(); today.setHours(0,0,0,0);
  return d < today; // strictly before today
}

// ── NORMALISE ROW ─────────────────────────────────────────────
function get(r,...keys){
  for(const k of keys){
    const v=r[k];
    if(v!==undefined&&v!==null&&String(v).trim()!==""&&String(v).trim()!=="NaT") return String(v).trim();
  }
  return "";
}

function normaliseRow(r){
  return {
    supplier:       get(r,"Supplier","supplier"),
    po_number:      get(r,"PO_number","PO_Number","PONumber","PO number"),
    incoterm:       get(r,"Incoterm"),
    pol:            get(r,"POL"),
    pod:            get(r,"POD"),
    pieces:         get(r,"No_ of Pieces","No. of Pieces","No_of_Pieces").replace(/\.0$/,""),
    gross_wt:       get(r,"Gross Wt_ (Kgs)","Gross Wt. (Kgs)","Gross_Wt__Kgs_").replace(/\.0$/,""),
    cbm:            get(r,"CBM"),
    vessel:         get(r,"Vessel"),
    pickup:         fmtDate(get(r,"Pickup","pickup")),
    arrival_wh:     fmtDate(get(r,"Arrival at Warehouse","Arrival_at_Warehouse")),
    etd:            fmtDate(get(r,"ETD","etd")),
    sob:            fmtDate(get(r,"Shipped_on_Board","Shipped on Board","SOB")),
    eta:            fmtDate(get(r,"ETA","eta")),
    pre_alert_date: fmtDate(get(r,"Pre-alert Date","Pre_alert_Date","Pre-Alert Date","PreAlertDate","Pre_Alert_Date","Pre-alert_Date")),
    position_no:    get(r,"Position_No","Position No","Position_No_","TKM Position No"),
    remarks:        get(r,"Remarks"),
  };
}

// ── SEARCH ────────────────────────────────────────────────────
function doSearch(){
  const q=document.getElementById("search-input").value.trim().toLowerCase();
  if(!q) return;
  document.getElementById("clear-btn").style.display="inline";
  const res=allShipments.filter(s=>{
    const po=s.po_number.toLowerCase().includes(q);
    const pos=s.position_no.toLowerCase().includes(q);
    if(searchType==="po") return po;
    if(searchType==="pos") return pos;
    return po||pos;
  });
  const c=document.getElementById("results");
  if(res.length===0){
    c.innerHTML=`<div class="empty"><div class="icon">🔍</div><h3>No records found</h3><p>No shipments match "<strong>${escHtml(q)}</strong>". Please check your reference number.</p></div>`;
  } else {
    c.innerHTML=`<div class="result-count">${res.length} shipment${res.length>1?"s":""} found for "<strong>${escHtml(q)}</strong>"</div>`+res.map(renderCard).join("");
  }
}

function clearSearch(){ document.getElementById("search-input").value=""; document.getElementById("results").innerHTML=""; document.getElementById("clear-btn").style.display="none"; }
function updatePlaceholder(){ document.getElementById("search-input").placeholder={both:"e.g. TSL/57439 or 22-0010-605-00",po:"e.g. TSL/57439/4415887949",pos:"e.g. 22-0010-605-00"}[searchType]; }

// ── RENDER CARD ───────────────────────────────────────────────
function renderCard(s){

  // ── 7 milestones ──
  const steps = [
    { label:"Order\nReceived", done: !!s.po_number },                          // always done if PO exists
    { label:"Booked",          done: !!s.vessel && s.vessel!=="TBA" },          // vessel name filled
    { label:"Picked Up",       done: isCompleted(s.pickup) },                   // pickup date is in the past
    { label:"Arrived\nat WH",  done: isCompleted(s.arrival_wh) },              // arrival date is in the past
    { label:"Vessel\nDeparted",done: isCompleted(s.sob) },                     // SOB date is in the past
    { label:"Pre-alert\nSent", done: isCompleted(s.pre_alert_date) },          // pre-alert date is in the past
    { label:"Vessel\nArrived", done: false },                                   // open for now
  ];

  // How many steps complete (for fill line width)
  const doneCount = steps.filter(s=>s.done).length;
  const fillPct   = doneCount===0 ? 0 : ((doneCount-1)/(steps.length-1)*100);

  const nodesHTML = steps.map((step,i)=>{
    const isDone = step.done;
    const lines  = step.label.split("\n");
    return `
      <div class="tracker-node">
        <div class="node-circle ${isDone?"done":"open"}">
          ${isDone?"":`<span style="font-size:10px;color:#d1d5db">${i+1}</span>`}
        </div>
        <div class="node-label ${isDone?"done":"open"}">
          ${lines.map(l=>escHtml(l)).join("<br>")}
        </div>
      </div>`;
  }).join("");

  // ── info values ──
  const v = (val,fallback="-")=> val&&val!=="-"&&val!=="TBA"&&val!==""
    ? `<span class="info-value">${escHtml(val)}</span>`
    : `<span class="info-value tba">${fallback}</span>`;

  const vhl = (val,fallback="-")=> val&&val!=="-"&&val!=="TBA"&&val!==""
    ? `<span class="info-value highlight">${escHtml(val)}</span>`
    : `<span class="info-value tba">${fallback}</span>`;

  // Packages / Weight // CBM
  const pkgStr = [
    s.pieces  ? s.pieces+" pkgs"  : "",
    s.gross_wt? s.gross_wt+" kg"  : "",
    s.cbm     ? s.cbm+" m³"       : "",
  ].filter(Boolean).join(" · ") || "-";

  // Route
  const vesselLabel = s.vessel&&s.vessel!=="TBA"&&s.vessel!==""
    ? `<span class="route-vessel">${escHtml(s.vessel)}</span>` : `<span class="route-vessel" style="color:#475569;font-style:italic">Vessel TBA</span>`;

  return `
  <div class="card">

    <!-- Header -->
    <div class="card-head">
      <div class="card-po-label">PO Number</div>
      <div class="card-po-value">${escHtml(s.po_number||"-")}</div>
      <div class="card-route" style="margin-top:14px">
        <div class="route-port">
          <div class="route-port-code">${escHtml(s.pol||"—")}</div>
          <div class="route-port-label">Origin</div>
        </div>
        <div class="route-mid">
          ${vesselLabel}
          <div class="route-arrow-line"></div>
        </div>
        <div class="route-port">
          <div class="route-port-code">${escHtml(s.pod||"—")}</div>
          <div class="route-port-label">Destination</div>
        </div>
      </div>
    </div>

    <!-- 7-step tracker -->
    <div class="tracker-wrap">
      <div class="tracker-title">Shipment Progress</div>
      <div class="tracker">
        <div class="tracker-line-bg">
          <div class="tracker-line-fill" style="width:${fillPct}%"></div>
        </div>
        <div class="tracker-nodes">${nodesHTML}</div>
      </div>
    </div>

    <!-- Info grid -->
    <div class="info-grid">

      <div class="info-item">
        <div class="info-label">TKM Position No.</div>
        ${vhl(s.position_no)}
      </div>
      <div class="info-item">
        <div class="info-label">Supplier</div>
        ${v(s.supplier)}
      </div>

      <div class="info-item">
        <div class="info-label">Incoterm</div>
        ${v(s.incoterm)}
      </div>
      <div class="info-item">
        <div class="info-label">Packages · Weight · CBM</div>
        <span class="info-value">${escHtml(pkgStr)}</span>
      </div>

      <div class="info-item">
        <div class="info-label">Pickup Date</div>
        ${s.pickup&&s.pickup!=='-'&&s.pickup!==''?'<span class="info-value">'+labelDate(s.pickup)+'</span>':'<span class="info-value tba">TBA</span>'}
      </div>
      <div class="info-item">
        <div class="info-label">Vessel</div>
        ${v(s.vessel,"TBA")}
      </div>

      <div class="info-item">
        <div class="info-label">POL (Origin Port)</div>
        <span class="info-value">${escHtml(s.pol||"—")}<span class="info-sep">→</span>ETD: ${s.etd?`<strong>${labelDate(s.etd)}</strong>`:`<span style="color:#94a3b8;font-style:italic">TBA</span>`}</span>
      </div>
      <div class="info-item">
        <div class="info-label">POD (Destination Port)</div>
        <span class="info-value">${escHtml(s.pod||"—")}<span class="info-sep">→</span>ETA: ${s.eta?`<strong>${labelDate(s.eta)}</strong>`:`<span style="color:#94a3b8;font-style:italic">TBA</span>`}</span>
      </div>

      <div class="info-item full">
        <div class="info-label">Pre-alert Date</div>
        ${s.pre_alert_date&&s.pre_alert_date!=='-'&&s.pre_alert_date!==''?'<span class="info-value">'+labelDate(s.pre_alert_date)+'</span>':'<span class="info-value tba">-</span>'}
      </div>

    </div>

    ${s.remarks ? `
    <div style="margin:0 20px 18px;background:#f8fafc;border-radius:10px;padding:12px 14px;border:1px solid #e2e8f0">
      <div style="font-size:10px;color:#64748b;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px">Remarks</div>
      <div style="font-size:12px;color:#374151;line-height:1.6">${escHtml(s.remarks)}</div>
    </div>` : ""}

  </div>`;
}

// ── UI HELPERS ────────────────────────────────────────────────
function showLoader(){ document.getElementById("loader").style.display="block"; document.getElementById("search-area").style.display="none"; document.getElementById("error-box").style.display="none"; document.getElementById("pill-text").textContent="Loading…"; document.getElementById("live-dot").style.display="none"; }
function showSearchArea(){ document.getElementById("loader").style.display="none"; document.getElementById("search-area").style.display="block"; document.getElementById("live-dot").style.display="inline-block"; document.getElementById("pill-text").textContent=`Live · ${allShipments.length} shipments`; document.getElementById("status-bar").textContent=`⟳ Data fetched at ${fetchedAt.toLocaleTimeString()} · ${allShipments.length} shipments loaded`; }
function showError(html){ document.getElementById("loader").style.display="none"; document.getElementById("error-box").style.display="block"; document.getElementById("error-box").innerHTML="⚠️ "+html; document.getElementById("pill-text").textContent="Error"; }
function escHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
</script>
</body>
</html>
